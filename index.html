<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELARA | Luxury Candles</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#000;
}

.logo{
font-size:35px;
font-weight:bold;
color:gold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url("https://images.unsplash.com/photo-1602872030358-9a2b6b7d6c64?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:70px;
color:gold;
}

.hero p{
font-size:22px;
margin:20px;
}

button{
padding:15px 35px;
font-size:18px;
background:gold;
border:none;
border-radius:30px;
cursor:pointer;
}

.products{
padding:80px 10%;
}

.products h2{
text-align:center;
font-size:45px;
margin-bottom:40px;
color:gold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#1b1b1b;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:15px;
}

.card p{
padding:0 15px 20px;
}

footer{
background:#000;
text-align:center;
padding:30px;
margin-top:60px;
}
</style>

</head>

<body>

<header>

<div class="logo">VELARA</div>

<nav>

<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<div>

<h1>VELARA</h1>

<p>
Luxury Handcrafted Engraved Candles
<br>
Velas artesanales grabadas hechas a mano
</p>

<a href="#products">
<button>Explore Collection</button>
</a>
<button>Shop Now</button>

</div>

</section>

<section class="products" id="products">

<h2>Best Sellers</h2>

<div class="grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1603006905003-be475563bc59?auto=format&fit=crop&w=900&q=80">

<h3>Floral Candle</h3>

<p>29.99 €</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?auto=format&fit=crop&w=900&q=80">

<h3>Luxury Candle</h3>

<p>39.99 €</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15?auto=format&fit=crop&w=900&q=80">

<h3>Gift Box</h3>

<p>49.99 €</p>

</div>

</div>

</section>

<footer>

© 2026 VELARA - Luxury Candles

</footer>

</body>

</html>
